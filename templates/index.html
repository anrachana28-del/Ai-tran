<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Khmer AI Translator</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.box{
    max-width:600px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input, button{
    padding:10px;
    margin-top:10px;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    cursor:pointer;
}

pre{
    text-align:left;
    background:#0f172a;
    padding:10px;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="box">

    <h2>🎬 Video Upload AI</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="video" required>
        <br>
        <button type="submit">Upload</button>
    </form>

    <hr>

    <h3>📝 Result</h3>

    <pre>{{ text }}</pre>

</div>

</body>
</html>
