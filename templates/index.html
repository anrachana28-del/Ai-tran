<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khmer AI Video Translator MVP</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

h1{
    color:#38bdf8;
}

input{
    margin:20px 0;
    padding:10px;
    width:100%;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
    border-radius:10px;
}

button{
    padding:12px 25px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#16a34a;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#0f172a;
    border:1px solid #334155;
    border-radius:10px;
    min-height:120px;
    text-align:left;
    white-space:pre-wrap;
}

.small{
    font-size:12px;
    color:#94a3b8;
}
</style>

</head>
<body>

<div class="container">

    <h1>🎬 Khmer AI Video Translator MVP</h1>

    <p class="small">
        Upload video → Extract speech → Show text
    </p>

    <!-- Upload Form -->
    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="video" accept="video/*" required>
        <br>
        <button type="submit">🚀 Upload & Process</button>
    </form>

    <hr style="margin:20px 0; border-color:#334155;">

    <!-- Result -->
    <h3>📝 Result (English Text)</h3>

    <div class="result">
        {{ text }}
    </div>

</div>

</body>
</html>
